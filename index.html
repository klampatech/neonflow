<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEONFLOW - Task Manager</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- App Header -->
  <header id="app-header">
    <button class="sidebar-toggle" aria-label="Toggle sidebar">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="app-logo">
      <span class="logo-text">NEON</span><span class="logo-accent">FLOW</span>
    </div>
    <div class="header-search">
      <input type="text" placeholder="Search tasks..." class="global-search">
    </div>
    <button class="btn-new-task">+ New Task</button>
  </header>

  <!-- App Sidebar -->
  <aside id="app-sidebar">
    <nav class="sidebar-nav">
      <ul class="list-nav" id="list-nav">
        <!-- Dynamic list items -->
      </ul>
    </nav>
    <div class="sidebar-footer">
      <span class="task-stats">0 tasks</span>
    </div>
  </aside>

  <!-- App Main Content -->
  <main id="app-main">
    <!-- Quick add bar inserted dynamically -->
  </main>

  <!-- Modal Layer -->
  <div id="app-modal-layer"></div>

  <!-- Task Creation JS -->
  <script src="js/store.js"></script>
  <script src="js/task-list-view.js"></script>
  <script src="js/task-creation.js"></script>
  <script src="js/task-completion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
