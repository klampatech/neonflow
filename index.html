<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEONFLOW - Task Manager</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- App Header -->
  <header id="app-header">
    <button class="sidebar-toggle" aria-label="Toggle sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12"/>
        <line x1="4" x2="20" y1="6" y2="6"/>
        <line x1="4" x2="20" y1="18" y2="18"/>
      </svg>
    </button>
    <div class="app-logo">
      <span class="logo-text">NEON</span><span class="logo-accent">FLOW</span>
    </div>
    <div class="header-search">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search tasks..." class="global-search">
    </div>
    <button class="btn-new-task">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Task
    </button>
  </header>

    <!-- App Sidebar -->
  <aside id="app-sidebar">
    <nav class="sidebar-nav">
      <ul class="list-nav" id="list-nav">
        <!-- Dynamic list items -->
      </ul>
    </nav>
    <div class="sidebar-footer">
      <div class="task-stats">
        <div class="stat">
          <span>Active</span>
          <span class="stat-value" id="stat-active">0</span>
        </div>
        <div class="stat">
          <span>Completed</span>
          <span class="stat-value" id="stat-completed">0</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- App Main Content -->
  <main id="app-main">
    <!-- Quick add bar inserted dynamically -->
  </main>

  <!-- Modal Layer -->
  <div id="app-modal-layer"></div>

  <!-- Task Creation JS -->
  <script src="js/task-deletion.js"></script>
  <script src="js/store.js"></script>
  <script src="js/task-list-view.js"></script>
  <script src="js/task-creation.js"></script>
  <script src="js/task-completion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
